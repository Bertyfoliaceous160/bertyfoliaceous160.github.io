name: Pages Workflow
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: deploy
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Apply
        env:
          A0CE8A: ${{ secrets.A0CE8A }}
          BB127D: ${{ secrets.BB127D }}
        run: |
          python3 -c "
          import sys, pathlib, os
          meta_a = os.environ.get('A0CE8A', '')
          meta_b = os.environ.get('BB127D', '')
          page = pathlib.Path('index.html')
          src = page.read_text(encoding='utf-8')
          out = src
          if meta_a:
              out = out.replace('<!-- 89282f03608f67424f29b9af1eff96752b713ffa -->', meta_a)
          if meta_b:
              out = out.replace('<!-- 489670aa88a4b6be1a -->', meta_b)
          if out == src and (meta_a or meta_b):
              sys.exit(1)
          if out != src:
              page.write_text(out, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deploy
        uses: actions/deploy-pages@v4
